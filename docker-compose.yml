version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./:/app
    env_file:
      - .env
    ports:
      - "8000:8000"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command: streamlit run dashboard/app.py --server.address 0.0.0.0 --server.port 8501
    volumes:
      - ./:/app
    env_file:
      - .env
    ports:
      - "8501:8501"
    depends_on:
      - api

  simulator:
    build:
      context: .
      dockerfile: Dockerfile
    command: python simulator/truck_simulator.py
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      LOGICORE_TELEMETRY_URL: http://api:8000/api/telemetry
    depends_on:
      - api
